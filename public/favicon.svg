<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gtext" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Gradient border -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Dark inner background -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="6.5" fill="#0a0a0f"/>
  <!-- Subtle inner glow -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="6.5" fill="url(#grad)" opacity="0.06"/>
  <!-- Letter A -->
  <text
    x="16"
    y="23"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-weight="900"
    font-size="21"
    fill="url(#gtext)"
    letter-spacing="-0.5"
  >A</text>
  <!-- Accent dot — node/cursor motif -->
  <circle cx="22" cy="22.5" r="2" fill="#00d4ff" opacity="0.85"/>
</svg>
